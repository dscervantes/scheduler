---
apiVersion: v1
kind: Template
metadata:
  name: scheduler
objects:

- apiVersion: cloud.redhat.com/v1alpha1
  kind: ClowdApp
  metadata:
    name: scheduler
  spec:
    envName: ${ENV_NAME}
    optionalDependencies:
      - ingress
      - export-service
      - rbac
    testing:
      iqePlugin: scheduler
    database:
      name: scheduler
      version: 16
    inMemoryDb: true
    kafkaTopics:
    - replicas: 3
      partitions: 16
      topicName: platform.notifications.events
    deployments:
    - name: api
      webServices:
        private:
          enabled: False
        public:
          enabled: True
        metrics:
          enabled: False
      minReplicas: ${{API_REPLICAS}}
      deploymentStrategy:
        rollingParams:
          maxSurge: 25%
          maxUnavailable: 25%
      podSpec:
        minReadySeconds: 15
        progressDeadlineSeconds: 600
        image: ${IMAGE}:${IMAGE_TAG}
        initContainers:
        - name: db-migration
          image: ${IMAGE}:${IMAGE_TAG}
          command:
            - ./scheduler
            - db_migration
            - up
          env:
          - name: LOG_LEVEL
            value: DEBUG
          - name: DB_MAX_OPEN_CONNECTIONS
            value: "25"
          - name: DB_MAX_IDLE_CONNECTIONS
            value: "5"
          - name: DB_CONNECTION_MAX_LIFETIME
            value: 5m
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
        command:
          - ./scheduler
          - api
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /metrics
            port: 9000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 10
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /metrics
            port: 9000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        resources:
          limits:
            cpu: ${API_CPU_LIMIT}
            memory: ${API_MEMORY_LIMIT}
          requests:
            cpu: ${API_CPU_REQUEST}
            memory: ${API_MEMORY_REQUEST}
        env:
        - name: LOG_LEVEL
          value: INFO
        - name: DB_MAX_OPEN_CONNECTIONS
          value: "25"
        - name: DB_MAX_IDLE_CONNECTIONS
          value: "5"
        - name: DB_CONNECTION_MAX_LIFETIME
          value: 5m
        - name: KAFKA_CLIENT_ID
          value: scheduler-api
        - name: KAFKA_TIMEOUT
          value: 30s
        - name: KAFKA_RETRIES
          value: "5"
        - name: KAFKA_COMPRESSION
          value: snappy
        - name: KAFKA_REQUIRED_ACKS
          value: "-1"
        - name: METRICS_ENABLED
          value: "true"
        - name: METRICS_NAMESPACE
          value: insights
        - name: METRICS_SUBSYSTEM
          value: scheduler
        - name: READ_TIMEOUT
          value: 30s
        - name: WRITE_TIMEOUT
          value: 30s
        - name: SHUTDOWN_TIMEOUT
          value: 30s
        - name: USER_VALIDATOR_IMPL
          value: ${USER_VALIDATOR_IMPL}
        - name: JOB_COMPLETION_NOTIFIER_IMPL
          value: ${JOB_COMPLETION_NOTIFIER_IMPL}
        - name: REDIS_ENABLED
          value: "true"

    - name: worker
      webServices:
        private:
          enabled: False
        public:
          enabled: False
        metrics:
          enabled: True
      minReplicas: ${{WORKER_REPLICAS}}
      deploymentStrategy:
        rollingParams:
          maxSurge: 1
          maxUnavailable: 1
      podSpec:
        minReadySeconds: 15
        progressDeadlineSeconds: 600
        image: ${IMAGE}:${IMAGE_TAG}
        command:
          - ./scheduler
          - worker
        terminationGracePeriodSeconds: 300
        lifecycle:
          preStop:
            exec:
              command:
                - /bin/sh
                - -c
                - sleep 15
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /metrics
            port: 9000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 10
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /metrics
            port: 9000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        resources:
          limits:
            cpu: ${WORKER_CPU_LIMIT}
            memory: ${WORKER_MEMORY_LIMIT}
          requests:
            cpu: ${WORKER_CPU_REQUEST}
            memory: ${WORKER_MEMORY_REQUEST}
        env:
        - name: LOG_LEVEL
          value: INFO
        - name: DB_MAX_OPEN_CONNECTIONS
          value: "25"
        - name: DB_MAX_IDLE_CONNECTIONS
          value: "5"
        - name: DB_CONNECTION_MAX_LIFETIME
          value: 5m
        - name: REDIS_ENABLED
          value: "true"
        - name: ENABLE_PERIODIC_SYNC
          value: "true"
        - name: SCHEDULER_DB_TO_REDIS_SYNC_INTERVAL
          value: "10m"
        - name: METRICS_ENABLED
          value: "true"
        - name: METRICS_PORT
          value: "8080"
        - name: METRICS_NAMESPACE
          value: insights
        - name: METRICS_SUBSYSTEM
          value: scheduler_worker
        - name: USER_VALIDATOR_IMPL
          value: ${USER_VALIDATOR_IMPL}
        - name: JOB_COMPLETION_NOTIFIER_IMPL
          value: ${JOB_COMPLETION_NOTIFIER_IMPL}
        - name: EXPORT_SERVICE_URL
          value: ${EXPORT_SERVICE_URL}
        - name: EXPORT_SERVICE_PUBLIC_URL
          value: ${EXPORT_SERVICE_PUBLIC_URL}
        - name: EXPORT_SERVICE_TIMEOUT
          value: 5m
        - name: EXPORT_SERVICE_MAX_RETRIES
          value: "3"
        - name: EXPORT_SERVICE_POLL_INTERVAL
          value: 5s
        - name: EXPORT_SERVICE_POLL_MAX_RETRIES
          value: "60"
        - name: SHUTDOWN_TIMEOUT
          value: 300s
        - name: KAFKA_CLIENT_ID
          value: scheduler-worker
        - name: KAFKA_TIMEOUT
          value: 30s
        - name: KAFKA_RETRIES
          value: "5"
        - name: KAFKA_COMPRESSION
          value: snappy
        - name: KAFKA_REQUIRED_ACKS
          value: "-1"
        - name: THREESCALE_URL
          value: ${THREESCALE_URL}

parameters:
- description: Initial amount of memory the scheduler api container will request.
  displayName: Memory Request
  name: API_MEMORY_REQUEST
  required: true
  value: 256Mi
- description: Maximum amount of memory the scheduler api.
  displayName: Memory Limit
  name: API_MEMORY_LIMIT
  required: true
  value: 512Mi
- description: Initial amount of cpu the scheduler api container will request.
  displayName: CPU Request
  name: API_CPU_REQUEST
  required: true
  value: 200m
- description: Maximum amount of cpu the scheduler api container can use.
  displayName: CPU Limit
  name: API_CPU_LIMIT
  required: true
  value: 500m

- description: Initial amount of memory the scheduler worker container will request.
  displayName: Worker Memory Request
  name: WORKER_MEMORY_REQUEST
  required: true
  value: 256Mi
- description: Maximum amount of memory the scheduler worker.
  displayName: Worker Memory Limit
  name: WORKER_MEMORY_LIMIT
  required: true
  value: 1Gi
- description: Initial amount of cpu the scheduler worker container will request.
  displayName: Worker CPU Request
  name: WORKER_CPU_REQUEST
  required: true
  value: 200m
- description: Maximum amount of cpu the scheduler worker container can use.
  displayName: Worker CPU Limit
  name: WORKER_CPU_LIMIT
  required: true
  value: 1000m

- description: The log level to use for logging
  displayName: The log level to use for logging
  name: LOG_LEVEL
  required: true
  value: DEBUG
- name: LOG_FORMAT
  value: logstash
- description: The number of replicas to use for the scheduler api
  name: API_REPLICAS
  value: '1'
- description: The number of replicas to use for the scheduler worker
  name: WORKER_REPLICAS
  value: '3'
- description: Image
  name: IMAGE
  required: true
  value: quay.io/redhat-user-workloads/hcc-integrations-tenant/scheduler/scheduler
- description: Image tag
  name: IMAGE_TAG
  required: true
- description : ClowdEnvironment name
  name: ENV_NAME
  required: true

- name: USER_VALIDATOR_IMPL
  value: "3scale"
  required: true
- name: THREESCALE_URL
  value: http://env-ephemeral-bqr8fd-mbop.ephemeral-bqr8fd.svc.cluster.local:8090

- name: JOB_COMPLETION_NOTIFIER_IMPL
  value: "notifications"
  required: true

- name: EXPORT_SERVICE_URL
  value: http://export-service-service:8000/api/export/v1
  required: true
- name: EXPORT_SERVICE_PUBLIC_URL
  description: Public-facing URL for export service download links
  value: https://console.redhat.com/api/export/v1
  required: true
